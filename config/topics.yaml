# ── Pipeline Defaults ───────────────────────────────────────────────────────
defaults:
  max_papers: 10        # per topic
  min_citations: 20     # minimum Semantic Scholar citations
  days_back: 365        # how far back to search
  arxiv_delay_sec: 3.0  # between arXiv API calls (be polite)
  s2_delay_sec: 1.5     # between Semantic Scholar API calls

# ── arXiv Category Filters ─────────────────────────────────────────────────
# All downloads are filtered to papers in these categories.
# See https://arxiv.org/category_taxonomy for full list.
categories:
  # Computer Science
  - cs.AI
  - cs.CL
  - cs.CV
  - cs.IT
  - cs.LG
  - cs.NE
  - cs.DS
  - cs.RO
  - cs.DB
  - cs.DM
  - cs.GT
  - cs.ET
  - cs.MA
  - cs.SE
  # Statistics
  - stat.AP
  - stat.CO
  - stat.ME
  - stat.ML
  - stat.TH
  # Mathematics
  - math.FA
  - math.NA
  - math.OC
  - math.PR
  - math.SP
  - math.ST
  # Quantitative Finance
  - q-fin.MF
  - q-fin.PM
  - q-fin.PR
  - q-fin.RM
  - q-fin.ST
  - q-fin.TR
  - q-fin.CP
  - q-fin.EC
  - q-fin.GN
  # Economics
  - econ.EM
  - econ.GN
  - econ.TH

